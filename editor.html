<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ImageForge — 編集</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@300;400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/editor.css">
</head>
<body>

<div class="wrap">
  <header>
    <a class="logo" href="index.html">ImageForge</a>
    <nav class="header-nav">
      <a class="nav-link" href="index.html">変換</a>
      <a class="nav-link active" href="editor.html">編集</a>
    </nav>
  </header>

  <!-- 画像がない場合のドロップエリア -->
  <input type="file" id="editorFileInput" accept="image/*" style="display:none">
  <div class="editor-drop-prompt" id="editorDrop">
    <p>画像をドロップ、またはクリックして開く</p>
    <p style="margin-top:6px;font-size:11px;color:var(--text-faint)">変換ページで「編集」ボタンを押すと自動で開きます</p>
  </div>

  <!-- エディタ本体（画像読み込み後に表示） -->
  <div id="editorMain" style="display:none">

    <!-- EDITOR GRID -->
    <div class="editor-layout">

      <!-- LEFT TOOLBAR -->
      <div class="toolbar">
        <button class="tool-btn" data-tool="select" title="選択">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
            <path d="M3 2l10 5.5-5 1.5-2 5L3 2z" stroke="currentColor" stroke-width="1.3" stroke-linejoin="round"/>
          </svg>
        </button>

        <div class="tool-sep"></div>

        <button class="tool-btn" data-tool="pen" title="フリーハンド">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
            <path d="M2 13L5.5 12 13 4.5a1.5 1.5 0 00-2.1-2.1L3 10l-1 3z" stroke="currentColor" stroke-width="1.3" stroke-linejoin="round"/>
          </svg>
        </button>

        <button class="tool-btn" data-tool="rect" title="四角形">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
            <rect x="2.5" y="3.5" width="11" height="9" rx="1" stroke="currentColor" stroke-width="1.3"/>
          </svg>
        </button>

        <button class="tool-btn" data-tool="ellipse" title="円・楕円">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
            <ellipse cx="8" cy="8" rx="5.5" ry="4" stroke="currentColor" stroke-width="1.3"/>
          </svg>
        </button>

        <button class="tool-btn" data-tool="arrow" title="矢印">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
            <path d="M3 13L13 3M13 3H8M13 3v5" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
          </svg>
        </button>

        <button class="tool-btn" data-tool="text" title="テキスト">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
            <path d="M3 4h10M8 4v9M5 13h6" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
          </svg>
        </button>

        <div class="tool-sep"></div>

        <button class="tool-btn" data-tool="mosaic" title="モザイク・ぼかし">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
            <rect x="2" y="2" width="5" height="5" rx="0.5" stroke="currentColor" stroke-width="1.2"/>
            <rect x="9" y="2" width="5" height="5" rx="0.5" stroke="currentColor" stroke-width="1.2"/>
            <rect x="2" y="9" width="5" height="5" rx="0.5" stroke="currentColor" stroke-width="1.2"/>
            <rect x="9" y="9" width="5" height="5" rx="0.5" stroke="currentColor" stroke-width="1.2"/>
          </svg>
        </button>

        <button class="tool-btn" data-tool="crop" title="トリミング">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
            <path d="M4 2v8a2 2 0 002 2h8M2 4h8a2 2 0 012 2v8" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
          </svg>
        </button>
      </div>

      <!-- TOPBAR -->
      <div class="topbar">
        <span class="topbar-label">色</span>
        <div class="color-swatch" id="colorSwatch" style="background:#e74c3c">
          <input type="color" id="colorPicker" value="#e74c3c">
        </div>

        <div class="topbar-sep"></div>

        <span class="topbar-label">太さ</span>
        <select class="size-select" id="lineWidthSel">
          <option value="1">1px</option>
          <option value="2">2px</option>
          <option value="3" selected>3px</option>
          <option value="5">5px</option>
          <option value="8">8px</option>
          <option value="12">12px</option>
        </select>

        <div class="topbar-sep"></div>

        <span class="topbar-label">文字サイズ</span>
        <select class="size-select" id="fontSizeSel">
          <option value="14">14px</option>
          <option value="18">18px</option>
          <option value="20" selected>20px</option>
          <option value="24">24px</option>
          <option value="32">32px</option>
          <option value="48">48px</option>
        </select>

        <div class="topbar-sep"></div>

        <span class="topbar-label">モザイク強度</span>
        <select class="size-select" id="mosaicStr">
          <option value="6">弱</option>
          <option value="12" selected>中</option>
          <option value="24">強</option>
          <option value="40">最強</option>
        </select>

        <div class="topbar-actions">
          <button class="btn-ghost" id="reloadImageBtn" style="padding:8px 14px;font-family:var(--mono);font-size:12px">画像を変更</button>
          <button class="btn-ghost" id="undoBtn" title="元に戻す (Ctrl+Z)" style="padding:8px 14px;font-family:var(--mono);font-size:12px">↩ 元に戻す</button>
          <button class="btn-ghost" id="redoBtn" title="やり直し (Ctrl+Y)"  style="padding:8px 14px;font-family:var(--mono);font-size:12px">↪ やり直し</button>
          <button class="btn-ghost" id="clearAllBtn" style="padding:8px 14px;font-family:var(--mono);font-size:12px">クリア</button>
          <button class="btn-primary" id="saveBtn" style="padding:8px 20px">保存 (JPEG)</button>
        </div>
      </div>

      <!-- CANVAS -->
      <div class="canvas-wrap" id="canvasWrap" style="position:relative">
        <canvas id="mainCanvas"></canvas>
      </div>

      <!-- SIDE PANEL -->
      <div class="side-panel">
        <div>
          <div class="panel-section-title">レイヤー</div>
          <div class="layers-list" id="layersList">
            <div style="font-size:12px;font-family:var(--mono);color:var(--text-faint);padding:8px 0">
              まだオブジェクトがありません
            </div>
          </div>
        </div>

        <div>
          <div class="panel-section-title">操作ガイド</div>
          <div style="font-size:11px;font-family:var(--mono);color:var(--text-muted);line-height:2">
            <div>選択 → Delete で削除</div>
            <div>Ctrl+Z / Ctrl+Y で履歴</div>
            <div>テキスト → Enter で確定</div>
            <div>トリミング → ドラッグで範囲</div>
          </div>
        </div>
      </div>

    </div><!-- /.editor-layout -->
  </div><!-- /#editorMain -->
</div><!-- /.wrap -->

<footer class="wrap">
  <span>すべての処理はブラウザ内で完結。ファイルはサーバーに送信されません。</span>
  <span>ImageForge</span>
</footer>

<script src="js/editor.js"></script>
</body>
</html>
